services:
  app:
    build: .
    ports:
      - "1303:3000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=izhubs_erp
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-izhubs_dev_2026}
      - JWT_SECRET=${JWT_SECRET:-dev_jwt_secret_change_in_production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev_refresh_secret_change_in_production}
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-izhubs_dev_2026}@postgres:5432/izhubs_erp
      # REDIS_URL: uncomment when BullMQ is implemented (v0.2)
      # - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    networks:
      - izhubs_network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: izhubs_erp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-izhubs_dev_2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - izhubs_network

  # redis:  ← Uncomment when BullMQ background jobs are needed (v0.2)
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - izhubs_network

networks:
  izhubs_network:
    driver: bridge

volumes:
  postgres_data:
  # redis_data:  ← Uncomment with Redis service (v0.2)
